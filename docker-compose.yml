services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw-data/config:/home/node/.openclaw
      - ./openclaw-data/workspace:/home/node/workspace
      - ./openclaw-entrypoint.sh:/openclaw-entrypoint.sh:ro
      # NOTE: /var/www/deployments is NOT read-only because the deployment pipeline
      # agents write built applications here. This is an accepted trade-off.
      - /var/www/deployments:/deployments
      # WARNING: Docker socket mount grants container-escape-level access to the host.
      # Required for the deployment pipeline — OpenClaw agents build and run Docker
      # containers as part of workflow execution. This is an accepted architectural risk.
      # See SECURITY_AUDIT.md S-01 for details.
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    group_add:
      - "988"
    entrypoint: ["/bin/sh", "/openclaw-entrypoint.sh"]
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    env_file:
      - .env
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_AUTH_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: platform-db
    restart: unless-stopped
    # No ports mapping — backend connects via internal DNS (postgres:5432).
    # Use `docker compose exec postgres psql -U platform -d agentplatform` for admin access.
    environment:
      POSTGRES_DB: agentplatform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d agentplatform"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: platform-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/agentplatform
      OPENCLAW_WS_URL: ws://openclaw:18789
      OPENCLAW_AUTH_TOKEN: ${OPENCLAW_AUTH_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_DEFAULT_CHAT_ID: ${TELEGRAM_DEFAULT_CHAT_ID:-}
      TELEGRAM_ACCESS_PIN: ${TELEGRAM_ACCESS_PIN:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-yuno-agent-factory}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      ADMIN_USERS: ${ADMIN_USERS:-}
      ALLOWED_ORIGINS: "http://localhost:3001,http://${HOST_IP:-localhost}:${FRONTEND_PORT:-3001}"
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      DEBUG_ENDPOINTS_ENABLED: ${DEBUG_ENDPOINTS_ENABLED:-false}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
    volumes:
      - ./backend:/app
      - ./openclaw-data/workspace:/openclaw-workspace
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: platform-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      VITE_API_URL: "http://${HOST_IP:-localhost}:${BACKEND_PORT:-8001}"
      VITE_WS_URL: "ws://${HOST_IP:-localhost}:${BACKEND_PORT:-8001}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
